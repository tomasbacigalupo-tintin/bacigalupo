<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding:6px 0; }
  .badge {
    font-family: var(--font-body); font-weight: 600; font-size: 12px; line-height:1;
    padding: 5px 10px; border-radius: var(--radius-sm); display:inline-flex; align-items:center; gap:6px;
    letter-spacing: .02em;
  }
  .badge .dot { width:6px; height:6px; border-radius:999px; background: currentColor; }
  .b-info    { background: var(--primary-50);  color: var(--primary-700); }
  .b-success { background: var(--success-50);  color: var(--success-700); }
  .b-warning { background: var(--warning-50);  color: var(--warning-700); }
  .b-danger  { background: var(--danger-50);   color: var(--danger-700); }
  .b-neutral { background: var(--neutral-100); color: var(--neutral-700); }
</style></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="row">
    <span class="badge b-info"><span class="dot"></span>En análisis</span>
    <span class="badge b-success"><span class="dot"></span>Liquidado</span>
    <span class="badge b-warning"><span class="dot"></span>Pendiente documentación</span>
    <span class="badge b-danger"><span class="dot"></span>Rechazado</span>
    <span class="badge b-neutral"><span class="dot"></span>Archivado</span>
  </div>
</div></body></html>
