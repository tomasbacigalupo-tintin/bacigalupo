<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Top nav</title><link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; margin:0; }
  .nav { display:flex; align-items:center; justify-content:space-between; padding: 16px 28px; border-bottom: 1px solid var(--border-subtle); background:#fff; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand img { height: 36px; }
  .links { display:flex; gap:24px; }
  .links a { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--neutral-700); text-decoration: none; letter-spacing: .02em; }
  .links a:hover { color: var(--primary-600); }
  .links a.active { color: var(--primary-600); }
  .cta { font-family: var(--font-body); font-weight:600; font-size:13px; padding:9px 16px; background: var(--primary-500); color:#fff; border-radius: var(--radius-md); }
</style></head>
<body><div class="nav">
  <div class="brand"><img src="../assets/logo-primary.png" alt="" /></div>
  <div class="links">
    <a href="#" class="active">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Nosotros</a>
    <a href="#">Cobertura</a>
    <a href="#">Contacto</a>
  </div>
  <a class="cta" href="#">Solicitar inspección</a>
</div></body></html>
