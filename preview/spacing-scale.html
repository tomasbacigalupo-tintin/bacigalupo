<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction:column; gap:8px; }
  .row { display:flex; align-items:center; gap:14px; font-family:var(--font-mono); font-size:11px; color:var(--fg-2); }
  .row .tok { width:64px; color:var(--fg-1); font-weight:600; }
  .row .px  { width:48px; text-align:right; }
  .bar { height:14px; background:var(--primary-500); border-radius:2px; }
</style></head>
<body><div class="card" style="padding:18px 24px;">
  <div class="stack">
    <div class="row"><span class="tok">--space-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
    <div class="row"><span class="tok">--space-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
    <div class="row"><span class="tok">--space-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
    <div class="row"><span class="tok">--space-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
    <div class="row"><span class="tok">--space-5</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
    <div class="row"><span class="tok">--space-6</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
    <div class="row"><span class="tok">--space-7</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
    <div class="row"><span class="tok">--space-8</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
    <div class="row"><span class="tok">--space-9</span><span class="px">96</span><div class="bar" style="width:96px"></div></div>
  </div>
</div></body></html>
