<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-page); }
  .card { background: var(--bg-page); }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; padding:8px; }
  .tile { background:#fff; height:90px; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; }
  .name { font-family: var(--font-display); font-weight:700; font-size:13px; color:var(--fg-1); }
  .desc { font-family: var(--font-mono); font-size:10px; color:var(--fg-2); }
</style></head>
<body><div class="card" style="padding:22px 24px;">
  <div class="grid">
    <div class="tile" style="box-shadow:var(--shadow-sm);"><span class="name">shadow-sm</span><span class="desc">hover lift</span></div>
    <div class="tile" style="box-shadow:var(--shadow-md);"><span class="name">shadow-md</span><span class="desc">cards · menus</span></div>
    <div class="tile" style="box-shadow:var(--shadow-lg);"><span class="name">shadow-lg</span><span class="desc">modals · overlays</span></div>
  </div>
</div></body></html>
