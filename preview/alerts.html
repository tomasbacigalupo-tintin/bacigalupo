<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Alerts</title><link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction:column; gap:10px; }
  .alert { display:flex; gap:10px; padding: 12px 14px; border-radius: var(--radius-md); border:1px solid; font-family: var(--font-body); font-size: 13px; line-height: 1.4; }
  .alert strong { font-weight:700; }
  .a-info    { background: var(--primary-50);  border-color: #B3D5E9; color: var(--primary-800); }
  .a-success { background: var(--success-50);  border-color: #B7DAC8; color: var(--success-700); }
  .a-warning { background: var(--warning-50);  border-color: #E6CC9B; color: var(--warning-700); }
  .a-danger  { background: var(--danger-50);   border-color: #E0AEB4; color: var(--danger-700); }
  .ico { width:18px; height:18px; flex:none; border-radius:999px; background: currentColor; opacity:.18; margin-top: 2px; }
</style></head>
<body><div class="card" style="padding:18px 22px;">
  <div class="stack">
    <div class="alert a-info"><span class="ico"></span><div><strong>Inspección programada.</strong> Un inspector visitará el domicilio el 18/03 entre 9 y 12 hs.</div></div>
    <div class="alert a-warning"><span class="ico"></span><div><strong>Falta documentación.</strong> Subir título del vehículo para continuar con el expediente.</div></div>
    <div class="alert a-success"><span class="ico"></span><div><strong>Liquidación aprobada.</strong> El pago se acreditará en 48 hs hábiles.</div></div>
  </div>
</div></body></html>
