<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Iconography</title><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:6px; padding: 8px 4px; border:1px solid var(--border-subtle); border-radius: var(--radius-sm); background:#fff; }
  .cell svg { width: 24px; height: 24px; stroke: var(--primary-600); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style></head>
<body><div class="card" style="padding:18px 22px;">
  <div class="grid">
    <div class="cell"><i data-lucide="clipboard-list"></i><span class="label">claims</span></div>
    <div class="cell"><i data-lucide="file-check"></i><span class="label">approved</span></div>
    <div class="cell"><i data-lucide="search"></i><span class="label">inspect</span></div>
    <div class="cell"><i data-lucide="map-pin"></i><span class="label">location</span></div>
    <div class="cell"><i data-lucide="camera"></i><span class="label">capture</span></div>
    <div class="cell"><i data-lucide="shield-check"></i><span class="label">risk</span></div>
    <div class="cell"><i data-lucide="bar-chart-3"></i><span class="label">analysis</span></div>
    <div class="cell"><i data-lucide="users"></i><span class="label">team</span></div>
  </div>
  <script>lucide.createIcons();</script>
</div></body></html>
