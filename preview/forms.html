<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Form inputs</title><link rel="stylesheet" href="_card.css">
<style>
  .col { display:flex; flex-direction:column; gap:14px; max-width: 360px; }
  label { font-family: var(--font-display); font-size: 12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color: var(--neutral-700); margin-bottom: 6px; display:block; }
  .field input, .field select, .field textarea {
    width: 100%; box-sizing:border-box;
    font-family: var(--font-body); font-size: 14px; color: var(--fg-1);
    padding: 10px 12px; border: 1px solid var(--border-default); border-radius: var(--radius-sm);
    background: #fff; transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--primary-500); box-shadow: 0 0 0 3px rgba(64,144,192,.18); }
  .field .hint { font-size: 12px; color: var(--fg-2); margin-top: 6px; }
  .field.error input { border-color: var(--danger-500); }
  .field.error .hint { color: var(--danger-500); }
</style></head>
<body><div class="card" style="padding:20px 24px;">
  <div class="col">
    <div class="field">
      <label>Número de póliza</label>
      <input value="POL-2026-00481" />
    </div>
    <div class="field error">
      <label>CUIT del asegurado</label>
      <input value="20-1234567-X" />
      <div class="hint">El CUIT ingresado no es válido.</div>
    </div>
  </div>
</div></body></html>
