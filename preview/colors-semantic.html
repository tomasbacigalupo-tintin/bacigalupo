<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .sem  { border:1px solid var(--border-subtle); border-radius: var(--radius-md); overflow:hidden; }
  .sem .bar { height:64px; }
  .sem .meta { display:flex; flex-direction:column; gap:2px; padding:10px 12px; background:#fff; }
  .sem .name { font-family: var(--font-display); font-weight:700; font-size:13px; color:var(--fg-1); }
  .sem .hex { font-family: var(--font-mono); font-size:11px; color:var(--fg-2); }
</style></head>
<body><div class="card" style="padding:20px 24px;">
  <div class="grid">
    <div class="sem"><div class="bar" style="background:var(--primary-500)"></div><div class="meta"><span class="name">Info</span><span class="hex">#4090C0</span></div></div>
    <div class="sem"><div class="bar" style="background:var(--success-500)"></div><div class="meta"><span class="name">Success</span><span class="hex">#1F8A5B</span></div></div>
    <div class="sem"><div class="bar" style="background:var(--warning-500)"></div><div class="meta"><span class="name">Warning</span><span class="hex">#B7791F</span></div></div>
    <div class="sem"><div class="bar" style="background:var(--danger-500)"></div><div class="meta"><span class="name">Danger</span><span class="hex">#B23A48</span></div></div>
  </div>
</div></body></html>
