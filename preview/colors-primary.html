<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Primary ramp</title><link rel="stylesheet" href="_card.css">
<style>
  .ramp { display:grid; grid-template-columns: repeat(10, 1fr); gap:0; height:120px; border-radius: var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle); }
  .swatch { display:flex; flex-direction:column; justify-content:space-between; padding:8px 10px; font-family: var(--font-body); font-size:11px; line-height:1; font-weight:600; }
  .swatch .n { opacity:.85; letter-spacing: .04em; }
  .swatch .hex { font-family: var(--font-mono); font-size:10px; font-weight:500; }
</style></head>
<body><div class="card" style="padding:20px 24px;">
  <div class="ramp">
    <div class="swatch" style="background:var(--primary-50); color:#1A455F"><span class="n">50</span><span class="hex">#EFF6FB</span></div>
    <div class="swatch" style="background:var(--primary-100);color:#1A455F"><span class="n">100</span><span class="hex">#D9EAF4</span></div>
    <div class="swatch" style="background:var(--primary-200);color:#1A455F"><span class="n">200</span><span class="hex">#B3D5E9</span></div>
    <div class="swatch" style="background:var(--primary-300);color:#133349"><span class="n">300</span><span class="hex">#82BBDA</span></div>
    <div class="swatch" style="background:var(--primary-400);color:#fff"><span class="n">400</span><span class="hex">#5AA3CC</span></div>
    <div class="swatch" style="background:var(--primary-500);color:#fff"><span class="n">500</span><span class="hex">#4090C0</span></div>
    <div class="swatch" style="background:var(--primary-600);color:#fff"><span class="n">600</span><span class="hex">#2A6E97</span></div>
    <div class="swatch" style="background:var(--primary-700);color:#fff"><span class="n">700</span><span class="hex">#21577A</span></div>
    <div class="swatch" style="background:var(--primary-800);color:#fff"><span class="n">800</span><span class="hex">#1A455F</span></div>
    <div class="swatch" style="background:var(--primary-900);color:#fff"><span class="n">900</span><span class="hex">#133349</span></div>
  </div>
</div></body></html>
