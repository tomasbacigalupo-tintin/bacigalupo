<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Motion</title><link rel="stylesheet" href="_card.css">
<style>
  .stack { display:flex; flex-direction:column; gap: 14px; }
  .item { display:flex; align-items:center; gap: 16px; font-family: var(--font-body); font-size: 13px; }
  .item .tok { width: 110px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); font-weight:600; }
  .item .desc { color: var(--fg-2); }
  .ball-track { position:relative; width: 200px; height: 14px; background: var(--neutral-100); border-radius: 999px; overflow:hidden; }
  .ball { position:absolute; top:1px; left:1px; width:12px; height:12px; background: var(--primary-500); border-radius: 999px; animation-iteration-count: infinite; animation-duration: 1800ms; animation-direction: alternate; }
  .b1 { animation-name: r1; animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1); }
  .b2 { animation-name: r1; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
  .b3 { animation-name: r1; animation-timing-function: linear; }
  @keyframes r1 { from { left: 1px } to { left: calc(100% - 13px) } }
</style></head>
<body><div class="card" style="padding:18px 22px;">
  <div class="stack">
    <div class="item"><span class="tok">--ease-out</span><div class="ball-track"><div class="ball b1"></div></div><span class="desc">standard · everything by default</span></div>
    <div class="item"><span class="tok">--ease-in-out</span><div class="ball-track"><div class="ball b2"></div></div><span class="desc">two-direction transitions</span></div>
    <div class="item"><span class="tok">linear</span><div class="ball-track"><div class="ball b3"></div></div><span class="desc">progress · loaders only</span></div>
    <div class="item" style="color:var(--fg-2);font-family:var(--font-mono);font-size:11px;padding-top:4px;border-top:1px dashed var(--border-subtle);">
      <span>durations:</span><span><strong style="color:var(--fg-1)">150ms</strong> state · <strong style="color:var(--fg-1)">250ms</strong> entrance · max <strong style="color:var(--fg-1)">400ms</strong></span>
    </div>
  </div>
</div></body></html>
