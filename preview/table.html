<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Data table</title><link rel="stylesheet" href="_card.css">
<style>
  body { background:#fff; }
  table { width:100%; border-collapse: collapse; font-family: var(--font-body); font-size: 13px; font-variant-numeric: tabular-nums; }
  thead th { text-align:left; font-family: var(--font-display); text-transform: uppercase; letter-spacing: .08em; font-size: 11px; color: var(--neutral-600); font-weight:700; padding: 10px 12px; border-bottom: 1px solid var(--border-default); background: var(--neutral-50); }
  td { padding: 12px; border-bottom: 1px solid var(--border-subtle); color: var(--fg-1); }
  tbody tr:hover { background: var(--neutral-50); }
  td .badge { font-family: var(--font-body); font-weight:600; font-size: 11px; padding: 3px 8px; border-radius: var(--radius-sm); }
  .b-info { background: var(--primary-50); color: var(--primary-700); }
  .b-success { background: var(--success-50); color: var(--success-700); }
  .b-warning { background: var(--warning-50); color: var(--warning-700); }
  .num { text-align:right; }
</style></head>
<body><div class="card" style="padding:8px 16px;">
  <table>
    <thead><tr><th>Expediente</th><th>Asegurado</th><th>Estado</th><th class="num">Monto reclamado</th></tr></thead>
    <tbody>
      <tr><td>SIN-2026-00481</td><td>Logística del Sur S.A.</td><td><span class="badge b-info">En análisis</span></td><td class="num">$ 1.842.500,00</td></tr>
      <tr><td>SIN-2026-00478</td><td>M. Bertotti</td><td><span class="badge b-warning">Documentación</span></td><td class="num">$ 312.000,00</td></tr>
      <tr><td>SIN-2026-00471</td><td>Frigorífico Rosario</td><td><span class="badge b-success">Liquidado</span></td><td class="num">$ 4.715.300,00</td></tr>
    </tbody>
  </table>
</div></body></html>
