<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Neutral ramp</title><link rel="stylesheet" href="_card.css">
<style>
  .ramp { display:grid; grid-template-columns: repeat(12, 1fr); gap:0; height:120px; border-radius: var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle); }
  .swatch { display:flex; flex-direction:column; justify-content:space-between; padding:8px 8px; font-family: var(--font-body); font-size:10px; line-height:1; font-weight:600; }
  .swatch .hex { font-family: var(--font-mono); font-size:9px; font-weight:500; }
</style></head>
<body><div class="card" style="padding:20px 24px;">
  <div class="ramp">
    <div class="swatch" style="background:var(--neutral-0);   color:#1F2933;border-right:1px solid #E4E7EB"><span>0</span><span class="hex">#FFFFFF</span></div>
    <div class="swatch" style="background:var(--neutral-50);  color:#1F2933"><span>50</span><span class="hex">#F7F8FA</span></div>
    <div class="swatch" style="background:var(--neutral-100); color:#1F2933"><span>100</span><span class="hex">#EEF2F6</span></div>
    <div class="swatch" style="background:var(--neutral-200); color:#1F2933"><span>200</span><span class="hex">#E4E7EB</span></div>
    <div class="swatch" style="background:var(--neutral-300); color:#1F2933"><span>300</span><span class="hex">#CBD2D9</span></div>
    <div class="swatch" style="background:var(--neutral-400); color:#1F2933"><span>400</span><span class="hex">#9AA5B1</span></div>
    <div class="swatch" style="background:var(--neutral-500); color:#fff"><span>500</span><span class="hex">#7B8794</span></div>
    <div class="swatch" style="background:var(--neutral-600); color:#fff"><span>600</span><span class="hex">#52606D</span></div>
    <div class="swatch" style="background:var(--neutral-700); color:#fff"><span>700</span><span class="hex">#3E4C59</span></div>
    <div class="swatch" style="background:var(--neutral-800); color:#fff"><span>800</span><span class="hex">#2F3940</span></div>
    <div class="swatch" style="background:var(--neutral-900); color:#fff"><span>900</span><span class="hex">#1F2933</span></div>
    <div class="swatch" style="background:var(--neutral-950); color:#fff"><span>950</span><span class="hex">#111827</span></div>
  </div>
</div></body></html>
