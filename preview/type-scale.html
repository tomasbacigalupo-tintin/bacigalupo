<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Type scale</title><link rel="stylesheet" href="_card.css">
<style>
  table { border-collapse:collapse; width:100%; font-family: var(--font-body); }
  td { padding:8px 12px; border-bottom:1px solid var(--border-subtle); vertical-align:baseline; }
  td.spec { font-family:var(--font-display); color:var(--fg-1); white-space:nowrap; }
  td.token { font-family: var(--font-mono); font-size:11px; color:var(--fg-3); width:90px; }
  td.dim { font-family: var(--font-mono); font-size:11px; color:var(--fg-2); width:80px; text-align:right; }
  tr:last-child td { border-bottom:0; }
</style></head>
<body><div class="card" style="padding:16px 24px;">
  <table>
    <tr><td class="token">--fs-h1</td><td class="spec" style="font-size:36px;line-height:1;font-weight:700;letter-spacing:-0.01em;">H1 Display</td><td class="dim">48/56</td></tr>
    <tr><td class="token">--fs-h2</td><td class="spec" style="font-size:28px;line-height:1;font-weight:700;">H2 Section</td><td class="dim">36/44</td></tr>
    <tr><td class="token">--fs-h3</td><td class="spec" style="font-size:22px;line-height:1;font-weight:700;">H3 Sub-section</td><td class="dim">28/36</td></tr>
    <tr><td class="token">--fs-h4</td><td class="spec" style="font-size:18px;line-height:1;font-weight:700;">H4 Card title</td><td class="dim">22/30</td></tr>
    <tr><td class="token">--fs-body-lg</td><td class="spec" style="font-family:var(--font-body);font-size:16px;line-height:1;font-weight:400;">Body large — intro</td><td class="dim">18/28</td></tr>
    <tr><td class="token">--fs-body</td><td class="spec" style="font-family:var(--font-body);font-size:14px;line-height:1;font-weight:400;">Body — default paragraph</td><td class="dim">16/26</td></tr>
    <tr><td class="token">--fs-caption</td><td class="spec" style="font-family:var(--font-display);font-size:11px;line-height:1;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--primary-600);">EYEBROW / LABEL</td><td class="dim">12/18</td></tr>
  </table>
</div></body></html>
