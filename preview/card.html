<!doctype html><html lang="es"><head><meta charset="utf-8"><title>Card</title><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg-page); }
  .card-wrap { background: var(--bg-page); padding: 22px 24px; }
  .ds-card {
    background: #fff; border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: 22px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 150ms var(--ease-out);
  }
  .ds-card:hover { border-color: var(--primary-300); }
  .eyebrow { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--primary-600); }
  .title { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--fg-1); margin: 0; line-height: 1.2; }
  .body  { font-family: var(--font-body); font-size: 14px; color: var(--fg-2); margin: 0; line-height: 1.5; }
  .meta { display:flex; gap:18px; margin-top:6px; font-family: var(--font-body); font-size: 12px; color: var(--fg-3); }
  .meta strong { color: var(--fg-1); font-weight:600; }
</style></head>
<body><div class="card-wrap">
  <div class="ds-card">
    <span class="eyebrow">Servicio</span>
    <h4 class="title">Liquidación integral de siniestros</h4>
    <p class="body">Gestión completa del expediente: denuncia, inspección, valuación y cierre con respaldo documental.</p>
    <div class="meta"><span>Tiempo medio · <strong>14 días</strong></span><span>Cobertura · <strong>Nacional</strong></span></div>
  </div>
</div></body></html>
